name: Cleanup ugc/pending

on:
  schedule:
    - cron: '0 4 * * *'   # täglich 04:00 UTC
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Delete approved pending files
        run: |
          find ugc/pending -type f | while read pending_file; do
            filename=$(basename "$pending_file")
            approved_file="ugc/approved/$filename"

            if [ -f "$approved_file" ]; then
              echo "Lösche: $pending_file (in approved vorhanden)"
              rm "$pending_file"
            fi
          done

      - name: Merge approved JSONs into approved.json
        run: |
          find ugc/approved -name "*.json" -type f \
            | sort \
            | xargs jq -s '.' \
            > approved.json
          echo "$(find ugc/approved -name "*.json" | wc -l) Dateien zusammengeführt."

      - name: Commit and push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet HEAD; then
            echo "Keine Änderungen – nichts zu committen."
          else
            git add -A
            git commit -m "chore: remove approved files from ugc/pending, update approved.json"
            git push
          fi
